<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Every Charm - Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #fdf6f9; color: #333; }
    header { background: #ff7aa2; color: #fff; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }

    .cart h2 { color: #ff7aa2; font-size: 2rem; }
    .item { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .item p { margin: 0; }
    .total { font-size: 1.3rem; font-weight: bold; margin-top: 20px; }
    button { background: #ff7aa2; border: none; color: #fff; padding: 12px 20px; border-radius: 25px; cursor: pointer; margin-top: 20px; }
    button:hover { background: #ff5c8d; }

    footer { background: #333; color: #fff; text-align: center; padding: 20px 10px; margin-top: 40px; font-size: 0.9rem; }
    footer a { color: #ff7aa2; text-decoration: none; margin: 0 8px; }

</head>
<body>
  <header>
    <h1>Every Charm</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>

      <a href="contact.html">Contact</a>

  <section class="cart">
    <h2>Your Cart</h2>

    <div class="item">
      <p><strong>Rose Quartz Charm</strong><br>£18.00</p>

    <div class="item">
      <p><strong>Ocean Breeze</strong><br>£22.00</p>
      <p>Qty: 1</p>
    </div>

  </footer>
