<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shimmer Bracelets - Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #fdf6f9; color: #333; }
    header { background: #ff7aa2; color: #fff; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 1.8rem; }
    nav a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: bold; }
    nav a:hover { text-decoration: underline; }

    .contact { padding: 40px; max-width: 700px; margin: auto; }
    .contact h2 { font-size: 2rem; color: #ff7aa2; }
    .contact p { line-height: 1.6; }

    form { margin-top: 20px; display: flex; flex-direction: column; }
    input, textarea {
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      background: #ff7aa2;
      border: none;
      color: #fff;
      padding: 12px;
      font-size: 1rem;
      border-radius: 25px;
      cursor: pointer;
    }
    button:hover { background: #ff5c8d; }

    footer { background: #333; color: #fff; text-align: center; padding: 20px 10px; margin-top: 40px; font-size: 0.9rem; }
    footer a { color: #ff7aa2; text-decoration: none; margin: 0 8px; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Shimmer Bracelets</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="contact">
    <h2>Contact Us</h2>
    <p>Have a question, custom request, or need help with an order? Send us a message and we’ll get back to you as soon as possible.</p>

    <form action="https://formsubmit.co/harryprior@btinternet.com" method="POST">
      <input type="text" name="name" placeholder="Your Name" required />
      <input type="email" name="email" placeholder="Your Email" required />
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

      <!-- FormSubmit options -->
      <input type="hidden" name="_subject" value="New message from Shimmer Bracelets">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://yourwebsite.com/thankyou.html">

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Shimmer Bracelets · All rights reserved.</p>
    <p>
      <a href="about.html">Our Story</a> |
      <a href="shop.html">Shop</a>
    </p>
  </footer>
</body>
</html>
